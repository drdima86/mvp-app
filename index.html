
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Charge Alert – EVSE Tracker</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 40px auto; }
    h1 { margin-bottom: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    .status { font-size: 24px; margin-top: 15px; }
    .free { color: green; }
    .busy { color: red; }
    .unknown { color: gray; }
    .box { border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>

<h1>⚡ Charge Alert (EVSE)</h1>

<div class="box">
  <input id="stationId" placeholder="EVSE-ID eingeben (z. B. DE*MDS*E004231)">
  <button onclick="startTracking()">Tracking starten</button>

  <div class="status" id="statusText">Status: -</div>

  <div>
    <div><b>ID:</b> <span id="idOut">-</span></div>
    <div><b>Last check:</b> <span id="lastCheck">-</span></div>
    <div><b>Info:</b> <span id="info">-</span></div>
  </div>
</div>

<script>
let interval = null;
let lastStatus = null;

/* =========================
   START TRACKING
========================= */
function startTracking() {
  const id = document.getElementById("stationId").value.trim();

  if (!id) {
    alert("Bitte EVSE-ID eingeben");
    return;
  }

  document.getElementById("idOut").textContent = id;

  if (interval) clearInterval(interval);

  fetchStatus(id);
  interval = setInterval(() => fetchStatus(id), 15000);
}

/* =========================
   FETCH STATUS
========================= */
async function fetchStatus(evseId) {
  try {
    // 👉 offene API (keine Auth nötig)
    const res = await fetch(
      `https://api.openchargemap.io/v3/poi/?output=json&maxresults=20&countrycode=DE`
    );

    const data = await res.json();

    // =========================
    // 🔎 EVSE-MATCH
    // =========================
    let match = null;

    for (const poi of data) {
      if (!poi.Connections) continue;

      for (const c of poi.Connections) {

        // heuristisch: match über Operator + ähnlich ID
        if (
          evseId.toUpperCase().includes(poi.OperatorInfo?.Name?.substring(0,3)?.toUpperCase() || "")
        ) {
          match = poi;
          break;
        }
      }
      if (match) break;
    }

    // =========================
    // STATUS bestimmen
    // =========================
    let status = "unknown";

    if (match) {
      // heuristische Ableitung
      if (match.StatusType?.IsOperational === false) {
        status = "unknown";
      } else if (match.UsageType?.IsPayAtLocation === true) {
        status = "busy"; // oft frequentiert
      } else {
        status = "free";
      }
    }

    updateUI(status, evseId, match);

  } catch (e) {
    updateUI("unknown", evseId, null, "API Fehler");
  }
}

/* =========================
   UI UPDATE
========================= */
function updateUI(status, id, data, msg = "") {

  let statusText = "unknown";

  if (status === "free") statusText = "✅ Frei";
  if (status === "busy") statusText = "🚗 Belegt";
  if (status === "unknown") statusText = "❓ Unbekannt";

  const el = document.getElementById("statusText");

  el.textContent = "Status: " + statusText;
  el.className = "status " + status;

  document.getElementById("lastCheck").textContent = new Date().toLocaleTimeString();

  // Zusatzinfo
  if (data) {
    document.getElementById("info").textContent =
      data.AddressInfo?.Title || "Gefunden";
  } else {
    document.getElementById("info").textContent =
      msg || "Keine Daten gefunden";
  }

  // 🔔 Notification bei Statuswechsel
  if (lastStatus === "busy" && status === "free") {
    notify(id);
  }

  lastStatus = status;
}

/* =========================
   NOTIFICATION
========================= */
function notify(id) {
  if (Notification.permission === "granted") {
    new Notification("⚡ Ladesäule frei", {
      body: id + " ist jetzt verfügbar"
    });
  } else {
    Notification.requestPermission();
  }
}
</script>

</body>
</html>
