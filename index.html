
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MVP App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: auto;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>MVP Tool</h1>
    <p>Gib einen Wert ein:</p>

    <input id="input" placeholder="z.B. 100">
    <button onclick="calculate()">Berechnen</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculate() {
      const value = document.getElementById("input").value;
      const result = value * 2;
      document.getElementById("result").innerText = "Ergebnis: " + result;
    }
  </script>
</body>
</html>
