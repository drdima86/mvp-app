
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Charge Alert</title>
  <meta name="theme-color" content="#0f172a" />
  <meta
    name="description"
    content="Charge Alert MVP – echte Kartenintegration mit Leaflet, Watchlist und Alert-Historie."
  />

  <!-- Leaflet via offizieller CDN-Variante -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #162238;
      --text: #e7ecf5;
      --muted: #99a7bd;
      --line: rgba(255,255,255,0.08);
      --primary: #3b82f6;
      --primary-2: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --chip: #1f2b42;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --radius: 18px;
      --radius-sm: 12px;
      --max: 1180px;
      --bottom-nav-h: 78px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 16px calc(var(--bottom-nav-h) + 24px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1d4ed8, #22c55e);
      box-shadow: var(--shadow);
      font-size: 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.1;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.12);
      color: #b8f7cb;
      border: 1px solid rgba(34, 197, 94, 0.24);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.hero {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h2,
    .card h3 {
      margin: 0 0 10px;
      line-height: 1.2;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.93rem;
    }

    .hero-title {
