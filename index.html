
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Charge Alert</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="max-w-md mx-auto bg-white min-h-screen">

  <!-- HEADER -->
  <div class="bg-slate-900 text-white p-5 rounded-b-3xl">
    <div class="flex justify-between text-xs mb-2">
      <span>9:41</span>
      <span>🔋 5G</span>
    </div>

    <h1 class="text-2xl font-bold">Charge Alert</h1>
    <p class="text-sm text-slate-300">Ladesäulen live verfügbar</p>

    <div id="status" class="mt-4 text-sm">
      Noch kein Check ausgeführt
    </div>

    <button onclick="runCheck()" class="mt-3 w-full bg-white text-black rounded-xl py-2">
      Jetzt prüfen
    </button>
  </div>

  <!-- LIST -->
  <div id="list" class="p-4 space-y-3"></div>

  <!-- NAV -->
  <div class="fixed bottom-0 w-full max-w-md bg-white border-t p-2 flex justify-around">
    <button onclick="setTab('home')">⚡</button>
    <button onclick="setTab('map')">🗺️</button>
    <button onclick="setTab('alerts')">🔔</button>
  </div>

</div>

<script>

let tab = "home";

const stations = [
  { name: "IONITY Südkreuz", dist: 1.8, free: 0 },
  { name: "Aral Potsdamer Platz", dist: 2.4, free: 1 },
  { name: "EnBW Schöneberg", dist: 3.9, free: 2 }
];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (tab === "home") {
    stations.forEach(s => {
      list.innerHTML += `
        <div class="p-4 bg-white rounded-2xl shadow">
          <div class="font-bold">${s.name}</div>
          <div class="text-sm text-slate-500">${s.dist} km</div>
          <div class="${s.free>0 ? 'text-green-600' : 'text-orange-500'} text-sm mt-1">
            ${s.free} frei
          </div>
          <button onclick="alert('Alarm gesetzt')" class="mt-2 text-sm bg-black text-white px-3 py-2 rounded-xl">
            Alarm
          </button>
        </div>
      `;
    });
  }

  if (tab === "map") {
    list.innerHTML = `<div class="p-5 text-center text-sm">Karte placeholder</div>`;
  }

  if (tab === "alerts") {
    list.innerHTML = `<div class="p-5 text-center text-sm">Noch keine Alarme</div>`;
  }
}

function runCheck() {
  const best = stations.find(s => s.free > 0);

  if (best) {
    document.getElementById("status").innerText =
      `Verfügbar: ${best.name}`;
  } else {
    document.getElementById("status").innerText =
      `Keine freie Ladesäule`;
  }
}

function setTab(t) {
  tab = t;
  render();
}

render();

</script>

</body>
</html>
